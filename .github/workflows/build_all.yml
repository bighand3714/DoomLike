name: Build All Platforms

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_win64.exe.zip
          unzip godot.zip -d godot_dir
          echo "${{ github.workspace }}/godot_dir" >> $env:GITHUB_PATH
      - name: Export Windows
        run: godot --headless --export-release "Windows Desktop" build/windows/DoomLike.exe
      - uses: actions/upload-artifact@v4
        with:
          name: doomlike-windows
          path: build/windows/

  build-linux:
    name: Linux/X11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan deps
        run: sudo apt-get update && sudo apt-get install -y libvulkan1
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip godot.zip -d godot_dir
          chmod +x godot_dir/Godot_v4.6-stable_linux.x86_64
          echo "${{ github.workspace }}/godot_dir" >> $GITHUB_PATH
      - name: Export Linux
        run: godot --headless --export-release "Linux/X11" build/linux/DoomLike.x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: doomlike-linux
          path: build/linux/

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_macos.universal.zip
          unzip godot.zip -d godot_dir
          chmod +x godot_dir/Godot.app/Contents/MacOS/Godot
          echo "${{ github.workspace }}/godot_dir/Godot.app/Contents/MacOS" >> $GITHUB_PATH
      - name: Export macOS
        run: godot --headless --export-release "macOS" build/macos/DoomLike.zip
      - uses: actions/upload-artifact@v4
        with:
          name: doomlike-macos
          path: build/macos/

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip godot.zip -d godot_dir
          chmod +x godot_dir/Godot_v4.6-stable_linux.x86_64
          echo "${{ github.workspace }}/godot_dir" >> $GITHUB_PATH
      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Dev, O=DoomLike, L=City, S=State, C=CN"
      - name: Export Android
        run: godot --headless --export-release "Android" build/android/DoomLike.apk
      - uses: actions/upload-artifact@v4
        with:
          name: doomlike-android
          path: build/android/

  build-web:
    name: Web (HTML5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip godot.zip -d godot_dir
          chmod +x godot_dir/Godot_v4.6-stable_linux.x86_64
          echo "${{ github.workspace }}/godot_dir" >> $GITHUB_PATH
      - name: Export Web
        run: godot --headless --export-release "Web" build/web/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: doomlike-web
          path: build/web/
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web/
